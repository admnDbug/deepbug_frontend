<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Proyecto</title>
    <script src="head-loader.js"></script>
    <link rel="stylesheet" href="css/verproyecto.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="d-flex">
        <div class="sidebar d-flex flex-column">
            <div class="sidebar-brand">
                <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
                <span class="brand-text">Deep Bug</span>
            </div>

            <nav class="nav flex-column mt-4">
                <a class="nav-link" href="inicio.html"><i class="fas fa-folder"></i> Mis Proyectos</a>
                <a class="nav-link" href="consultas.html"><i class="fas fa-search"></i> Consultas</a>
                <a class="nav-link" href="familias.html" data-role="Responsable"><i class="fas fa-layer-group"></i> Familias</a>
                <a class="nav-link" href="zonas.html" data-role="Responsable"><i class="fas fa-map-marked-alt"></i> Zonas</a>
            </nav>
        </div>

        <div class="main-content w-100">
            <div class="top-header">
                <h4 class="mb-0 text-primary fw-bold">Visualizar Proyecto</h4>
                <div class="d-flex align-items-center gap-2">
                    <div class="dropdown">
                        <button class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle fa-lg text-primary"></i>
                            <span class="fw-bold text-dark" id="nombreUsuarioTop">Usuario</span>
                            <i class="fas fa-chevron-down text-primary"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="perfil.html"><i class="fas fa-user-edit fa-lg text-primary me-2"></i>Mi perfil</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="btnCerrarSesion"><i class="fas fa-door-closed fa-lg text-danger me-2"></i>Cerrar sesión</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="container-fluid px-4 py-4">
                <div class="row">
                    <div class="col-lg-8">
                        
                        <div class="card shadow-sm border-0 rounded-4 mb-4">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h3 class="fw-bold text-primary mb-0" id="vp-nombre-proyecto">Cargando proyecto...</h3>
                                    <span class="badge bg-success rounded-pill px-3 py-2" id="vp-zona-proyecto">Zona</span>
                                </div>
                                <p class="text-muted mb-1"><i class="far fa-calendar-alt me-2"></i>Creado el: <strong id="vp-fecha-creacion">--/--/----</strong></p>
                                <p class="text-muted mb-0"><i class="fas fa-user-tie me-2"></i>Responsable: <strong id="vp-responsable-nombre">Cargando...</strong></p>
                            </div>
                        </div>

                        <div id="vp-alerta-protocolo1"></div>

                        <h5 class="visualizer-section-title fw-bold mb-3"><i class="fas fa-clipboard-list me-2"></i>Estado de los Protocolos</h5>

                        <div class="row g-3" id="contenedor-protocolos">
                            </div>

                        <div class="d-flex flex-column gap-3 mt-4">
    <button class="btn btn-outline-primary w-100 rounded-pill fw-bold py-2 shadow-sm" id="btn-descargar-pdf">
        <i class="fas fa-file-pdf me-2"></i> Descargar Reporte PDF
    </button>
    
    <button class="btn btn-warning w-100 rounded-pill fw-bold py-2 shadow-sm text-dark" id="btn-salir-proyecto" data-role="Colaborador">
        <i class="fas fa-sign-out-alt me-2"></i> Salir del Proyecto
    </button>

    <button class="btn btn-danger w-100 rounded-pill fw-bold py-2 shadow-sm" id="btn-eliminar-proyecto" data-role="Responsable">
        <i class="fas fa-trash-alt me-2"></i> Eliminar Proyecto Definitivamente
    </button>
</div>

                    </div>

                    <div class="col-lg-4 mt-4 mt-lg-0">
                        
                        <div class="card shadow-sm border-0 rounded-4 mb-4 bg-primary bg-opacity-10" data-role="Responsable">
                            <div class="card-body text-center p-4">
                                <h6 class="fw-bold text-primary mb-2">Código de Invitación</h6>
                                <p class="small text-muted mb-3">Comparte este código para que otros se unan a tu equipo.</p>
                                <div class="bg-white rounded-3 py-2 px-3 d-inline-block border border-primary fw-bold fs-4 text-dark shadow-sm" id="vp-codigo-invitacion">
                                    ------
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm border-0 rounded-4">
                            <div class="card-body p-4">
                                <h5 class="fw-bold mb-4"><i class="fas fa-users me-2"></i>Equipo</h5>
                                <div id="contenedor-colaboradores">
                                    </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="verProyecto.js"></script>
<script src="generadorPdf.js"></script> </body>
</body>
</html>
