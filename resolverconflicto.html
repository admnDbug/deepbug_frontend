<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolver Conflicto</title>
    <script src="head-loader.js"></script>
    <link rel="stylesheet" href="css/verproyecto.css"> </head>
<body class="bg-light">

    <div class="d-flex">
        <div class="sidebar d-flex flex-column">
            <div class="sidebar-brand">
                <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
                <span class="brand-text">Deep Bug</span>
            </div>
            <nav class="nav flex-column mt-4">
                <a class="nav-link" href="inicio.html"><i class="fas fa-folder"></i> Mis Proyectos</a>
                <a class="nav-link" href="consultas.html"><i class="fas fa-search"></i> Consultas</a>
                <a class="nav-link" href="familias.html" data-role="Responsable"><i class="fas fa-layer-group"></i> Familias</a>
                <a class="nav-link" href="zonas.html" data-role="Responsable"><i class="fas fa-map-marked-alt"></i> Zonas</a>
            </nav>
        </div>

        <div class="main-content w-100">
            <div class="top-header">
                <h4 class="mb-0 text-danger fw-bold"><i class="fas fa-shield-alt me-2"></i>Resolución de Conflictos</h4>
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-bold text-dark" id="nombreUsuarioTop">Usuario</span>
                </div>
            </div>

            <div class="container-fluid px-4 py-4">
                
                <div class="text-center mb-5">
                    <h3 class="fw-bold text-dark">Protocolo <span id="num-protocolo">#</span> en Conflicto</h3>
                    <p class="text-muted">Dos colaboradores sincronizaron datos para este protocolo al mismo tiempo. <br>Revisa los detalles y selecciona cuál versión deseas conservar.</p>
                </div>

                <div class="row g-4 justify-content-center" id="contenedor-comparacion">
                    <div class="text-center"><i class="fas fa-spinner fa-spin fa-3x text-primary"></i><p class="mt-2">Cargando datos...</p></div>
                </div>

                <div class="text-center mt-5">
                    <button class="btn btn-secondary px-4 rounded-pill" onclick="window.history.back()">
                        <i class="fas fa-arrow-left me-2"></i> Volver al Proyecto
                    </button>
                </div>

            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="resolverconflicto.js"></script>
</body>
</html>
