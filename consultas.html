<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Estaciones</title>
    <script src="head-loader.js"></script>
    <link rel="stylesheet" href="css/consultas.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="d-flex">
    
    <div class="sidebar d-flex flex-column">
        <div class="sidebar-brand">
            <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
            <span class="brand-text">Deep Bug</span>
        </div>
        
        <nav class="nav flex-column mt-4">
            <a class="nav-link" href="inicio.html"><i class="fas fa-folder"></i> Mis Estaciones</a>
            <a class="nav-link" href="consultas.html"><i class="fas fa-search"></i> Consultas</a>
            <a class="nav-link" href="familias.html" data-role="Responsable"><i class="fas fa-layer-group"></i> Familias</a>
            <a class="nav-link" href="zonas.html" data-role="Responsable"><i class="fas fa-map-marked-alt"></i> Zonas</a>
        </nav>
    </div>

    <div class="main-content w-100">
        
        <div class="top-header">
            <h4 class="mb-0 text-primary fw-bold">Consultar Estaciones</h4>
            <div class="d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-circle fa-lg text-primary"></i>
                        <span class="fw-bold text-dark" id="nombreUsuarioTop">Usuario</span>
                        <i class="fas fa-chevron-down text-primary"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="perfil.html"><i class="fas fa-user-edit fa-lg text-primary me-2"></i>Mi perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="btnCerrarSesion"><i class="fas fa-door-closed fa-lg text-primary me-2"></i>Cerrar sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="container-fluid px-4">
            
            <div class="zone-header-actions d-flex justify-content-between align-items-center w-100 mb-3 px-1">
                <button type="button" id="btn-descargar-mapa" class="btn btn-sm btn-danger rounded-pill fw-bold px-3">
                    <i class="fas fa-file-pdf me-1"></i> Descargar Reporte y Mapa
                </button>
            </div>

            <div id="reporte-mapa-exportar" class="bg-white p-4 rounded-4 shadow-sm mb-4">
                
                <div class="row g-2 mb-3">
                    <div class="col-md-4">
                        <label class="small fw-bold text-muted">Filtrar por Zona</label>
                        <select id="filtro-zona" class="form-select form-select-sm rounded-pill">
                            <option value="todas">Todas las zonas</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="small fw-bold text-muted">Filtrar por Estación</label>
                        <select id="filtro-estacion" class="form-select form-select-sm rounded-pill" disabled>
                            <option value="todas">Todas las estaciones</option>
                        </select>
                    </div>
                </div>

                <div id="mapa-dashboard" style="height: 450px; border-radius: 12px; z-index: 1; border: 1px solid #dee2e6; margin-bottom: 30px;"></div>

                <h5 class="fw-bold text-primary mb-3"><i class="fas fa-list me-2"></i>Directorio de Estaciones</h5>

                <div class="table-info-search-wrapper mb-3">
                    <input type="text" id="search-consultas" class="table-info-search-input" placeholder="Buscar por estación, zona o calidad...">
                    <i class="fas fa-search table-info-search-icon"></i>
                </div>

                <div class="table-info-header-row">
                    <div class="table-info-col-name">Estación</div>
                    <div class="table-info-col-zona">Zona</div>
                    <div class="table-info-col-ubic">Coordenadas</div>
                    <div class="table-info-col-date">BMWP</div>
                    <div class="table-info-col-resp">Calidad</div>
                    <div class="table-info-col-act">Acción</div>
                </div>

                <div id="contenedor-consultas">
                    </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="consultas.js"></script>
<script src="roles.js"></script>
</body>
</html>
