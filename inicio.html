<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <script src="head-loader.js"></script>
    <link rel="stylesheet" href="css/inicio.css">
  
</head>
<body>

<div class="d-flex">
    
    <div class="sidebar d-flex flex-column">
        <div class="sidebar-brand">
            <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
            <span class="brand-text">Deep Bug</span>
        </div>
        
        <nav class="nav flex-column mt-4">
            <a class="nav-link" href="inicio.html"><i class="fas fa-folder"></i> Mis Proyectos</a>
            <a class="nav-link" href="consultas.html"><i class="fas fa-search"></i> Consultas</a>
            <a class="nav-link" href="familias.html" data-role="Responsable"><i class="fas fa-layer-group"></i> Familias</a>
            <a class="nav-link" href="zonas.html" data-role="Responsable"><i class="fas fa-map-marked-alt"></i> Zonas</a>
        </nav>
    </div>

    <div class="main-content w-100">
        
        <div class="top-header">
            <h4 class="mb-0 text-primary fw-bold">Mis Proyectos</h4>
            <div class="d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button 
                        class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent"
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                    >
                        <i class="fas fa-user-circle fa-lg text-primary"></i>
                        <span class="fw-bold text-dark" id="nombreUsuarioTop">Usuario</span>
                        <i class="fas fa-chevron-down text-primary"></i>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="perfil.html"><i class="fas fa-user-edit fa-lg text-primary me-2"></i>Mi perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="btnCerrarSesion"><i class="fas fa-door-closed fa-lg text-primary me-2"></i>Cerrar sesión</a></li>
                    </ul>
                    </div>
                <!-- Cambiar para que se actualice el usuario automaticamente y cierre sesion funcional-->
            </div>
        </div>

        <div class="d-flex justify-content-center mb-5">
            <button class="btn btn-join" data-bs-toggle="modal" data-bs-target="#joinProjectModal">
                <i class="fas fa-folder-plus me-2"></i> Unirme a un Proyecto

            </button>
        </div>

        <div class="container-fluid">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="contenedorProyectos">
                
                <div class="col" data-role="Responsable">
                    <a class="linknuevoproyecto" href="crearproyecto.html">
                        <div class="Nuevo-proyecto"> 
                            <div class="d-flex align-items-center mb-2">
                                <i class="fas fa-file-medical nuevoproyecto-icon me-2"></i>
                                <span class="nuevoproyecto-card-title">Nuevo Proyecto</span>
                            </div>
                        </div>
                    </a>                
                </div>
                
                </div>
        </div>
    </div>
</div>

<!-- POP UP de unirte a un proyecto -->
<div class="modal fade" id="joinProjectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content index-modal-content p-4">
            <div class="modal-body text-center">
                
                <h3 class="index-modal-title mb-2">Unirse a un proyecto</h3>
                
                <p class="text-muted small mb-4">Por favor ingrese su código de invitación</p>
                <!-- agregar funcion de validar codigo -->
                <div class="text-start">
                    <label class="index-modal-label">Ingresa el código</label>
                    <input type="text" class="index-modal-input" placeholder="Codigo" id="codigoInvitacionInput"/> <!-- value="codiguito=)" -->
                </div>

                <button type="button" class="index-modal-btn" id="btnUnirseProyecto">Ingresar</button>
                
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="roles.js"></script>
<script src="inicio.js"></script>
</body>
</html>
