<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <script src="head-loader.js"></script>
    <link rel="stylesheet" href="css/inicio.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="d-flex">
    
    <div class="sidebar d-flex flex-column">
        <div class="sidebar-brand">
            <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
            <span class="brand-text">Deep Bug</span>
        </div>
        
        <nav class="nav flex-column mt-4">
            <a class="nav-link" href="inicio.html"><i class="fas fa-folder"></i> Mis Estaciones</a>
            <a class="nav-link" href="consultas.html"><i class="fas fa-search"></i> Consultas</a>
            <a class="nav-link" href="familias.html" data-role="Responsable"><i class="fas fa-layer-group"></i> Familias</a>
            <a class="nav-link" href="zonas.html" data-role="Responsable"><i class="fas fa-map-marked-alt"></i> Zonas</a>
        </nav>
    </div>

    <div class="main-content w-100">
        
        <div class="top-header">
            <h4 class="mb-0 text-primary fw-bold">Mis Estaciones</h4>
            <div class="d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button 
                        class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent"
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                    >
                        <i class="fas fa-user-circle fa-lg text-primary"></i>
                        <span class="fw-bold text-dark" id="nombreUsuarioTop">Usuario</span>
                        <i class="fas fa-chevron-down text-primary"></i>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="perfil.html"><i class="fas fa-user-edit fa-lg text-primary me-2"></i>Mi perfil</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="btnCerrarSesion"><i class="fas fa-door-closed fa-lg text-primary me-2"></i>Cerrar sesión</a></li>
                    </ul>
                    </div>
                <!-- Cambiar para que se actualice el usuario automaticamente y cierre sesion funcional-->
            </div>
        </div>
        <button class="btn btn-sm btn-danger rounded-pill fw-bold px-3" id="btn-descargar-mapa">
            <i class="fas fa-file-pdf me-1"></i> Descargar Reporte
        </button>
        <div id="reporte-mapa-exportar" class="bg-white p-3 rounded-4 shadow-sm mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0"><i class="fas fa-map-marked-alt me-2 text-primary"></i>Mapa de Estaciones</h5>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Filtrar por Zona</label>
                    <select id="filtro-zona" class="form-select form-select-sm rounded-pill">
                        <option value="todas">Todas las zonas</option>
                        </select>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Filtrar por Estación</label>
                    <select id="filtro-estacion" class="form-select form-select-sm rounded-pill" disabled>
                        <option value="todas">Todas las estaciones</option>
                    </select>
                </div>
            </div>

            <div id="mapa-dashboard" style="height: 450px; border-radius: 12px; z-index: 1; border: 1px solid #dee2e6;"></div>

            <div class="mt-4">
                <h6 class="fw-bold text-primary mb-2">Índices BMWP/MEX de las estaciones mostradas</h6>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover text-center align-middle small">
                        <thead class="table-light">
                            <tr>
                                <th>Estación</th>
                                <th>Zona</th>
                                <th>Coordenadas</th>
                                <th>BMWP</th>
                                <th>Calidad</th>
                            </tr>
                        </thead>
                            <tbody id="tabla-mapa-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mb-5">
            <button class="btn btn-join" data-bs-toggle="modal" data-bs-target="#joinProjectModal">
                <i class="fas fa-folder-plus me-2"></i> Unirme a una Estacion

            </button>
        </div>

        <div class="container-fluid">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="contenedorEstaciones">
                
                <div class="col" data-role="Responsable">
                    <a class="linknuevaestacion" href="crearestacion.html">
                        <div class="Nueva-estacion"> 
                            <div class="d-flex align-items-center mb-2">
                                <i class="fas fa-file-medical nuevaestacion-icon me-2"></i>
                                <span class="nuevaestacion-card-title">Nueva Estacion</span>
                            </div>
                        </div>
                    </a>                
                </div>
                
                </div>
        </div>
    </div>
</div>

<!-- POP UP de unirte a una estacion -->
<div class="modal fade" id="joinProjectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content index-modal-content p-4">
            <div class="modal-body text-center">
                
                <h3 class="index-modal-title mb-2">Unirse a una estacion</h3>
                
                <p class="text-muted small mb-4">Por favor ingrese su código de invitación</p>
                <!-- agregar funcion de validar codigo -->
                <div class="text-start">
                    <label class="index-modal-label">Ingresa el código</label>
                    <input type="text" class="index-modal-input" placeholder="Codigo" id="codigoInvitacionInput"/> <!-- value="codiguito=)" -->
                </div>

                <button type="button" class="index-modal-btn" id="btnUnirseEstacion">Ingresar</button>
                
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="roles.js"></script>
<script src="inicio.js"></script>
</body>
</html>
