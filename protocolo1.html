<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo 1 - Deep Bug</title>
    <script src="head-loader.js"></script>
    <link rel="stylesheet" href="css/protocolouno.css">
    <style>
        .proto-input:disabled { background-color: #f8f9fa; color: #6c757d; border-color: #e9ecef; }
        .dynamic-container { background-color: #fcfcfc; border: 1px solid #e9ecef; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .table-param-insitu th { font-size: 0.75rem; vertical-align: middle; }
        .table-param-insitu td { padding: 4px !important; vertical-align: middle; }
        .param-input-matrix { font-size: 0.75rem; text-align: center; padding: 4px; height: 28px; }
    </style>
</head>
<body class="bg-light">

    <div class="d-flex">
        <div class="sidebar d-flex flex-column">
            <div class="sidebar-brand">
                <img src="img/logo-png.png" alt="Deep Bug Logo" class="brand-logo">
                <span class="brand-text">Deep Bug</span>
            </div>
            <nav class="nav flex-column mt-4">
                <a class="nav-link" href="inicio.html"><i class="fas fa-folder"></i> Mis Estaciones</a>
                <a class="nav-link" href="consultas.html"><i class="fas fa-search"></i> Consultas</a>
                <a class="nav-link" href="familias.html" data-role="Responsable"><i class="fas fa-layer-group"></i> Familias</a>
                <a class="nav-link" href="zonas.html" data-role="Responsable"><i class="fas fa-map-marked-alt"></i> Zonas</a>
            </nav>
        </div>

        <div class="main-content w-100">
            <div class="top-header">
                <div>
                    <h4 class="mb-0 text-primary fw-bold d-flex align-items-center">
                        Protocolo 1
                        <a href="#" id="link-estacion-top" class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-50 text-decoration-none text-truncate ms-3 d-flex align-items-center gap-1 hover-shadow" style="font-size: 0.55em; max-width: 250px; font-weight: 500; transition: 0.2s;" title="Regresar a la Estacion">
                            <i class="fas fa-arrow-left"></i> <span id="nombre-estacion-nav">Cargando...</span>
                        </a>
                    </h4>
                    <small class="text-primary fw-bold" id="estado-texto">Plan de Monitoreo</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-bold text-dark" id="nombreUsuarioTop">Usuario</span>
                </div>
            </div>

            <div class="container-fluid px-4 py-4">
                <div class="row justify-content-center">
                    <div class="col-lg-11">
                        
                        <div class="mb-4 d-flex align-items-center justify-content-between">
                            <div data-role="Responsable">
                                <button id="btnModificar" class="btn btn-primary rounded-pill px-4 me-2" style="display: none; background-color: #2b5c8f;">
                                    <i class="fas fa-edit me-2"></i>Modificar datos
                                </button>
                                <button id="btnGuardar" class="btn btn-success rounded-pill px-4" style="display: none; background-color: #2ea043;">
                                    <i class="fas fa-save me-2"></i>Guardar y Sincronizar
                                </button>
                            </div>
                        </div>

                        <form id="form-protocolo1">
                            <div class="accordion" id="protocolOneAccordion">

                                <div class="protocolOne-accordion-item mt-2">
                                    <button class="protocolOne-accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#acc-materiales">
                                        <span><i class="fas fa-boxes me-2"></i> Verificación de Materiales</span>
                                        <i class="fas fa-chevron-down"></i>
                                    </button>
                                    <div id="acc-materiales" class="collapse" data-bs-parent="#protocolOneAccordion">
                                        <div class="protocolOne-accordion-body">
                                            
                                            <h6 class="fw-bold text-primary mb-3">a) Equipos e instrumentos de medición</h6>
                                            <div class="row g-3 mb-4">
                                                <div class="col-12 d-flex align-items-center flex-wrap gap-2">
                                                    <div class="form-check me-3" style="width: 250px;">
                                                        <input class="form-check-input proto-input" type="checkbox" id="chk_adecuacion" disabled>
                                                        <label class="form-check-label small">Verificar adecuación de los embalajes</label>
                                                    </div>
                                                    <div class="form-check me-2">
                                                        <input class="form-check-input proto-input" type="checkbox" id="chk_adecuacion_no" disabled>
                                                        <label class="form-check-label small text-danger fw-bold">No</label>
                                                    </div>
                                                    <input type="text" class="form-control form-control-sm proto-input" style="flex: 1;" id="txt_adecuacion_no" placeholder="Especifique la causa..." disabled>
                                                </div>
                                                
                                                <div class="col-12 d-flex align-items-center flex-wrap gap-2 border-bottom pb-3">
                                                    <div class="form-check me-3" style="width: 250px;">
                                                        <input class="form-check-input proto-input" type="checkbox" id="chk_limpieza" disabled>
                                                        <label class="form-check-label small">Limpieza de los equipos</label>
                                                    </div>
                                                    <div class="form-check me-2">
                                                        <input class="form-check-input proto-input" type="checkbox" id="chk_limpieza_no" disabled>
                                                        <label class="form-check-label small text-danger fw-bold">No</label>
                                                    </div>
                                                    <input type="text" class="form-control form-control-sm proto-input" style="flex: 1;" id="txt_limpieza_no" placeholder="Especifique la causa..." disabled>
                                                </div>

                                                <div class="col-12 mt-3">
                                                    <div class="form-check">
                                                        <input class="form-check-input proto-input" type="checkbox" id="chk_metrologica" disabled>
                                                        <label class="form-check-label small fw-bold text-dark">Verificación metrológica de los instrumentos</label>
                                                    </div>
                                                </div>

                                                <div class="col-12" id="contenedor-equipos-patrones"></div>

                                                <div class="col-12 mt-3">
                                                    <label class="small fw-bold">Observación:</label>
                                                    <textarea class="form-control proto-input" id="txt_observacion_equipos" rows="2" disabled></textarea>
                                                </div>
                                            </div>

                                            <h6 class="fw-bold text-primary mb-3 border-top pt-3">b) Insumos (Cantidades)</h6>
                                            <div class="row g-3" id="contenedor-insumos"></div>

                                            <div class="mt-4 p-3 bg-light rounded border">
                                                <div class="d-flex justify-content-between align-items-center mb-2">
                                                    <h6 class="fw-bold text-dark mb-0">Otros Insumos</h6>
                                                    <button type="button" class="btn btn-outline-primary btn-sm proto-action" id="btn-add-insumo" style="display:none;"><i class="fas fa-plus me-1"></i>Añadir Insumo</button>
                                                </div>
                                                <div class="row g-3" id="contenedor-otros-insumos"></div>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                                
                                <div class="protocolOne-accordion-item">
                                    <button class="protocolOne-accordion-button fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#acc-datos">
                                        <span><i class="fas fa-business-time me-2"></i> Datos Generales</span>
                                        <i class="fas fa-chevron-down"></i>
                                    </button>
                                    <div id="acc-datos" class="collapse show" data-bs-parent="#protocolOneAccordion">
                                        <div class="protocolOne-accordion-body row g-3">
                                            <div class="col-md-6"><label class="form-label small fw-bold">Contacto</label><input type="text" class="form-control proto-input" id="dg_contacto" disabled></div>
                                            <div class="col-md-6"><label class="form-label small fw-bold">Provincia(s)</label><input type="text" class="form-control proto-input" id="dg_provincia" disabled></div>
                                            <div class="col-md-12"><label class="form-label small fw-bold">Objetivo</label><textarea class="form-control proto-input" id="dg_objetivo" rows="2" disabled></textarea></div>
                                        </div>
                                    </div>
                                </div>


                                <div class="protocolOne-accordion-item mt-2">
                                    <button class="protocolOne-accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#acc-responsables">
                                        <span><i class="fas fa-users me-2"></i> Responsables</span>
                                        <i class="fas fa-chevron-down"></i>
                                    </button>
                                    <div id="acc-responsables" class="collapse" data-bs-parent="#protocolOneAccordion">
                                        <div class="protocolOne-accordion-body">
                                            <label class="form-label fw-bold text-primary mb-2">Técnicos</label>
                                            <div id="contenedor-tecnicos" class="mb-3"></div>
                                            <button type="button" class="btn btn-outline-primary btn-sm mb-4 proto-action" id="btn-add-tecnico" style="display:none;"><i class="fas fa-plus me-1"></i>Añadir Técnico</button>
                                            
                                            <hr class="mb-4">
                                            <div class="row g-3">
                                                <div class="col-md-6"><label class="form-label small fw-bold">Conductor</label><input type="text" class="form-control proto-input" id="resp_conductor" disabled></div>
                                                <div class="col-md-6"><label class="form-label small fw-bold">Fecha elaboración plan</label><input type="text" class="form-control proto-input" id="resp_fecha" placeholder="DD/MM/YYYY" disabled></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </form>
                    </div> 
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="protocolo1.js"></script>
</body>
</html>
